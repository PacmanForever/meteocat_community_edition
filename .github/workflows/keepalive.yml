name: Keepalive Workflow

on:
  schedule:
    - cron: '15 0 * * *'  # Daily at 00:15 UTC
  workflow_dispatch:

jobs:
  keepalive:
    name: Keep workflows alive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create keepalive commit when repository is inactive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_INACTIVE_DAYS: "45"
        run: |
          set -eu

          repo_dir="$(mktemp -d)"
          trap 'rm -rf "$repo_dir"' EXIT

          git init "$repo_dir"
          cd "$repo_dir"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "FETCH_HEAD"

          last_commit_ts="$(git log -1 --format=%ct)"
          now_ts="$(date +%s)"
          inactive_days="$(( (now_ts - last_commit_ts) / 86400 ))"

          echo "Repository inactivity: ${inactive_days} days"

          if [ "$inactive_days" -lt "$MAX_INACTIVE_DAYS" ]; then
            echo "Recent repository activity detected; no keepalive commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep scheduled workflows active"
          git push origin "HEAD:${GITHUB_REF_NAME}"
